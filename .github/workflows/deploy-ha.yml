name: Publish HA Deploy Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: publish-ha-deploy-main
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      DEPLOY_BRANCH: ha-deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app for Home Assistant
        run: VITE_BASE_PATH=/local/ha-wallpanel/ pnpm build

      - name: Publish dist to deploy branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          test -d dist || (echo "::error::Missing dist directory after build" && exit 1)

          publish_dir="$(mktemp -d)"
          cp -R dist/. "${publish_dir}/"
          touch "${publish_dir}/.nojekyll"

          cd "${publish_dir}"
          git init
          git checkout -b "${DEPLOY_BRANCH}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA}"

          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin "${DEPLOY_BRANCH}"
